 # TokUp · 脉充 — Nginx 配置
 # 部署到 /etc/nginx/sites-available/tokup
 
 server {
     listen 80;
     server_name tokup.io api.tokup.io;
     return 301 https://$server_name$request_uri;
 }
 
 server {
     listen 443 ssl http2;
     server_name tokup.io;
 
     # SSL — 用 certbot 生成
     ssl_certificate /etc/letsencrypt/live/tokup.io/fullchain.pem;
     ssl_certificate_key /etc/letsencrypt/live/tokup.io/privkey.pem;
     ssl_protocols TLSv1.2 TLSv1.3;
     ssl_ciphers HIGH:!aNULL:!MD5;
 
     # 安全头
     add_header X-Frame-Options DENY;
     add_header X-Content-Type-Options nosniff;
     add_header X-XSS-Protection "1; mode=block";
     add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
 
     # 前端静态文件
     root /opt/tokup/frontend/dist;
     index index.html;
 
     # SPA 回退：所有前端路由都返回 index.html
     location / {
         try_files $uri $uri/ /index.html;
     }
 
     # API 代理到后端
     location /api/ {
         proxy_pass http://127.0.0.1:8000;
         proxy_http_version 1.1;
         proxy_set_header Host $host;
         proxy_set_header X-Real-IP $remote_addr;
         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
         proxy_set_header X-Forwarded-Proto $scheme;
 
         # 增大超时（AI 请求可能较慢）
         proxy_read_timeout 120s;
         proxy_send_timeout 120s;
     }
 }
